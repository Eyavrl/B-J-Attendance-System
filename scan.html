<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>B&amp;J Aircon Services — Attendance</title>
<link rel="icon" type="image/jpeg" href="https://eyavrl.github.io/attendance.html/bj_logo.png.jpg">
<link rel="apple-touch-icon" href="https://eyavrl.github.io/attendance.html/bj_logo.png.jpg">
<script src="api.js"></script>
<style>
  :root{--bg:#080b1f;--bg-2:#0d1230;--surface:#121838;--surface-2:#1a2150;--border:#262e63;--text:#eef1fb;--text-muted:#8a93c4;--navy-deep:#1d214e;--mint:#a8f0c6;--mint-deep:#1f6f4e;--amber:#f2b25c;--red:#ef6a5c;--mono:'JetBrains Mono',monospace;--sans:'Inter',sans-serif;--display:'Space Grotesk',sans-serif}
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    background-color:var(--bg);
    background-image:
      radial-gradient(ellipse 900px 500px at 50% -10%, rgba(168,240,198,.06), transparent 60%),
      linear-gradient(180deg, rgba(13,18,48,.94) 0%, rgba(8,11,31,.97) 100%);
    color:var(--text);
    font-family:var(--sans);
    min-height:100vh;
    position:relative;
  }
  body::before{
    content:'';
    position:fixed;
    inset:0;
    background:url('https://eyavrl.github.io/attendance.html/bj_logo.png.jpg') center 48% / min(560px, 92vw) no-repeat;
    opacity:0.14;
    pointer-events:none;
    z-index:0;
  }
  body > *{position:relative;z-index:1}
  .topbar{
    display:flex;align-items:center;padding:13px 18px;
    border-bottom:1px solid var(--border);
    background:linear-gradient(180deg, rgba(29,33,78,.95) 0%, rgba(18,24,56,.92) 100%);
    box-shadow:0 1px 0 rgba(168,240,198,.08);
  }
  .brand{display:flex;align-items:center;gap:11px}
  .brand-mark{
    width:40px;height:40px;border-radius:50%;
    background:var(--navy-deep);
    border:1px solid rgba(168,240,198,.35);
    overflow:hidden;flex-shrink:0;
    box-shadow:0 0 0 3px rgba(168,240,198,.05);
  }
  .brand-mark img{width:100%;height:100%;object-fit:cover;display:block}
  .brand-text{display:flex;flex-direction:column;line-height:1.15}
  .brand-text .sub{font-size:10.5px;color:var(--mint);letter-spacing:.6px;text-transform:uppercase;font-weight:600}
  main{max-width:520px;margin:0 auto;padding:18px 18px 48px}
  .brand-text .name{font-family:var(--display);font-weight:600;font-size:14.5px}
  .conn-banner{background:rgba(18,24,56,.88);backdrop-filter:blur(6px);border:1px solid var(--amber);border-radius:10px;padding:12px 14px;font-size:12.5px;color:var(--text-muted);margin-bottom:14px;line-height:1.5}
  .conn-banner.ok{border-color:var(--mint-deep);color:var(--mint)}
  .conn-banner.err{border-color:var(--red);color:#ffb4ad}
  .entry-card{
    background:rgba(18,24,56,.88);
    backdrop-filter:blur(6px);
    border:1px solid var(--border);
    border-radius:16px;
    padding:22px 20px;
  }
  .entry-card label{display:block;font-size:12px;color:var(--text-muted);margin-bottom:8px;font-weight:600}
  .entry-row{display:flex;gap:8px}
  .entry-row input{
    flex:1;
    background:var(--surface-2);
    border:1px solid var(--border);
    border-radius:10px;
    color:var(--text);
    padding:14px 14px;
    font-family:var(--mono);
    font-size:15px;
  }
  .entry-row input:focus{outline:2px solid var(--mint);outline-offset:1px}
  .btn{font-weight:600;font-size:13.5px;border:none;border-radius:9px;padding:11px 20px;cursor:pointer;background:var(--mint);color:#06160f}
  .btn-lg{font-size:15px;padding:14px 24px;min-width:88px}
  .btn:disabled{opacity:.5;cursor:not-allowed}
  .status-strip{margin-top:12px;display:flex;align-items:center;justify-content:center;gap:8px;font-family:var(--mono);font-size:11.5px;color:var(--text-muted);min-height:18px}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--text-muted)}
  .dot.live{background:var(--mint);box-shadow:0 0 6px var(--mint)}
  .result-card{margin-top:18px;background:rgba(18,24,56,.88);backdrop-filter:blur(6px);border:1px solid var(--border);border-left:4px solid var(--mint-deep);border-radius:12px;padding:18px;display:none}
  .result-card.show{display:block}
  .result-card.in{border-left-color:var(--mint)}
  .result-card.out{border-left-color:var(--amber)}
  .result-card.error{border-left-color:var(--red)}
  .result-top{display:flex;justify-content:space-between;gap:10px}
  .result-name{font-family:var(--display);font-weight:600;font-size:18px}
  .result-position{font-size:12.5px;color:var(--text-muted);margin-top:2px}
  .result-id{font-family:var(--mono);font-size:11px;color:var(--text-muted);margin-top:6px}
  .status-pill{font-family:var(--mono);font-size:11px;font-weight:600;padding:5px 10px;border-radius:999px}
  .status-pill.in{background:rgba(61,220,151,.14);color:var(--mint)}
  .status-pill.out{background:rgba(242,169,59,.14);color:var(--amber)}
  .status-pill.error{background:rgba(226,88,74,.14);color:var(--red)}
  .result-time{font-family:var(--mono);font-size:26px;margin-top:14px}
  .result-error-msg{font-size:13px;color:var(--red);margin-top:10px;line-height:1.5}
  .log-section{margin-top:26px}
  .log-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
  .log-header h2{font-family:var(--display);font-size:14px}
  .refresh-btn{background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:11.5px;font-family:var(--mono)}
  .log-list{display:flex;flex-direction:column;gap:6px}
  .log-row{display:flex;justify-content:space-between;background:rgba(18,24,56,.82);backdrop-filter:blur(4px);border:1px solid var(--border);border-radius:9px;padding:10px 13px;font-size:13px}
  .log-row .who .id{font-family:var(--mono);font-size:10.5px;color:var(--text-muted)}
  .log-row .when{display:flex;align-items:center;gap:8px}
  .log-row .when .tm{font-family:var(--mono);font-size:12px;color:var(--text-muted)}
  .tag{font-family:var(--mono);font-size:10px;font-weight:700;padding:3px 7px;border-radius:5px}
  .tag.in{background:rgba(61,220,151,.14);color:var(--mint)}
  .tag.out{background:rgba(242,169,59,.14);color:var(--amber)}
  .empty-log{text-align:center;padding:28px 16px;color:var(--text-muted);font-size:13px;border:1px dashed var(--border);border-radius:10px}
  footer{text-align:center;padding:20px;font-size:11px;color:var(--text-muted);font-family:var(--mono);padding-bottom:80px}
  .nav{position:fixed;bottom:0;left:0;right:0;display:flex;background:rgba(18,24,56,.98);border-top:1px solid var(--border);padding:8px 6px calc(8px + env(safe-area-inset-bottom));z-index:10}
  .nav a{flex:1;text-align:center;text-decoration:none;color:var(--text-muted);font-size:10px;padding:6px 4px;border-radius:8px}
  .nav a.active{color:var(--mint);background:rgba(168,240,198,.08)}
  .nav a span{display:block;font-size:18px;margin-bottom:2px}
</style>
</head>
<body>
<div class="topbar">
  <div class="brand">
    <div class="brand-mark">
      <img src="https://eyavrl.github.io/attendance.html/bj_logo.png.jpg" alt="B&amp;J Aircon Services logo">
    </div>
    <div class="brand-text">
      <span class="name">B&amp;J Aircon Services</span>
      <span class="sub">Attendance System</span>
    </div>
  </div>
</div>
<main>
  <div class="conn-banner" id="connBanner">Connecting to Google Sheet…</div>
  <div class="entry-card">
    <label for="employeeIdInput">Employee ID</label>
    <div class="entry-row">
      <input type="text" id="employeeIdInput" placeholder="e.g. 042023-14" autocomplete="off" autofocus>
      <button class="btn btn-lg" id="submitBtn" type="button">Log</button>
    </div>
    <div class="status-strip"><span class="dot" id="liveDot"></span><span id="statusText">Ready</span></div>
  </div>
  <div class="result-card" id="resultCard">
    <div class="result-top"><div><div class="result-name" id="resName">—</div><div class="result-position" id="resPosition">—</div><div class="result-id" id="resId">—</div></div><span class="status-pill" id="resPill">—</span></div>
    <div class="result-time" id="resTime">—</div>
    <div class="result-error-msg" id="resError" style="display:none"></div>
  </div>
  <div class="log-section"><div class="log-header"><h2>Today's log</h2><button class="refresh-btn" id="refreshLogBtn">↻ refresh</button></div><div class="log-list" id="logList"><div class="empty-log">No entries recorded yet today.</div></div></div>
</main>
<nav class="nav" id="mainNav">
  <a href="index.html"><span>🏠</span>Home</a>
  <a href="scan.html" class="active" id="navScan"><span>✎</span>Attendance</a>
  <a href="allowance.html" id="navAllowance"><span>₱</span>Allowance</a>
</nav>
<footer>B&amp;J Aircon Services — internal use only</footer>
<script>
var backendReady = false, isProcessing = false;
var errorStatusTimer = null;

function initApiUrl() {
  var apiBase = BjApi.getApiBase();
  localStorage.setItem(BjApi.STORAGE_KEY, apiBase);
  var navAllowance = document.getElementById('navAllowance');
  var navScan = document.getElementById('navScan');
  if (navAllowance) navAllowance.href = 'allowance.html';
  if (navScan) navScan.href = 'scan.html';
  return apiBase;
}

function runBackend(action, args) {
  return BjApi.runBackend(action, args);
}

document.getElementById('submitBtn').addEventListener('click', submitEmployeeId);
document.getElementById('employeeIdInput').addEventListener('keydown', function (e) { if (e.key === 'Enter') submitEmployeeId(); });
document.getElementById('refreshLogBtn').addEventListener('click', loadTodayLog);

function testConnection() {
  var banner = document.getElementById('connBanner');
  banner.className = 'conn-banner';
  banner.textContent = 'Connecting to Google Sheet and local database…';
  return runBackend('pingBackend').then(function (data) {
    backendReady = !!data.ok;
    if (data.ok) {
      banner.className = 'conn-banner ok';
      banner.textContent = 'Connected to "' + data.spreadsheet + '" (' + data.employeeCount + ' employees). Enter an Employee ID to log attendance.';
      setStatus('Ready', false);
      loadTodayLog();
    } else if (data.missingSheets && data.missingSheets.length) {
      banner.className = 'conn-banner err';
      banner.textContent = 'Missing sheet tabs: ' + data.missingSheets.join(', ') + '. Add them to your Google Sheet, then refresh.';
    } else {
      banner.className = 'conn-banner err';
      banner.textContent = data.error || 'Could not connect.';
    }
  }).catch(function (err) {
    banner.className = 'conn-banner err';
    banner.textContent = err.message + ' — Start attendance-backend/start.bat first, then open http://localhost:3000/scan.html';
  });
}

function submitEmployeeId() {
  var val = document.getElementById('employeeIdInput').value.trim();
  if (val) {
    handleEmployeeId(val);
    document.getElementById('employeeIdInput').value = '';
  }
}

function handleEmployeeId(raw) {
  if (!backendReady) { showResult({ ok: false, error: 'Not connected to sheet yet.' }); return; }
  if (isProcessing) return;
  var id = extractEmployeeId(raw);
  if (!id) {
    showResult({
      ok: false,
      error: 'ID not recognized. Enter a valid Employee ID like 042023-14.'
    });
    return;
  }
  isProcessing = true;
  document.getElementById('submitBtn').disabled = true;
  setStatus('Recording ' + id + '…', true);
  runBackend('scanEmployee', [id]).then(function (data) {
    showResult(data);
    loadTodayLog();
    setStatus(data.ok ? (data.allowance && data.allowance.ok && !data.allowance.skipped
      ? 'Logged · ₱' + (data.allowance.amount || 100) + ' allowance saved'
      : 'Logged! Enter next Employee ID.') : 'Ready', false);
    setTimeout(function () {
      isProcessing = false;
      document.getElementById('submitBtn').disabled = false;
      document.getElementById('employeeIdInput').focus();
    }, data.ok ? 800 : 400);
  }).catch(function (err) {
    showResult({ ok: false, error: err.message, id: id });
    setTimeout(function () {
      isProcessing = false;
      document.getElementById('submitBtn').disabled = false;
      document.getElementById('employeeIdInput').focus();
    }, 400);
  });
}

function showResult(data) {
  var card = document.getElementById('resultCard');
  if (!data.ok) {
    card.className = 'result-card show error';
    document.getElementById('resName').textContent = 'Could not log';
    document.getElementById('resPosition').textContent = '';
    document.getElementById('resId').textContent = data.id || '';
    document.getElementById('resPill').textContent = 'ERROR';
    document.getElementById('resPill').className = 'status-pill error';
    document.getElementById('resTime').textContent = '';
    document.getElementById('resError').style.display = 'block';
    document.getElementById('resError').textContent = data.error || 'Could not log attendance';
    setStatus(data.error || 'Could not log attendance', false);
    if (errorStatusTimer) clearTimeout(errorStatusTimer);
    errorStatusTimer = setTimeout(function () { setStatus('Ready', false); }, 3500);
    return;
  }
  card.className = 'result-card show' + (data.status === 'Time In' ? ' in' : ' out');
  document.getElementById('resName').textContent = data.name;
  document.getElementById('resPosition').textContent = data.position;
  document.getElementById('resId').textContent = data.id;
  document.getElementById('resPill').textContent = data.status.toUpperCase();
  document.getElementById('resPill').className = 'status-pill ' + (data.status === 'Time In' ? 'in' : 'out');
  document.getElementById('resTime').textContent = data.time;
  document.getElementById('resError').style.display = 'none';
}

function setStatus(t, live) {
  document.getElementById('statusText').textContent = t;
  document.getElementById('liveDot').classList.toggle('live', live);
}

function loadTodayLog() {
  if (!backendReady) return;
  runBackend('getTodayLogs').then(function (d) { renderLog(d.rows || []); }).catch(function () {});
}

function renderLog(rows) {
  var list = document.getElementById('logList');
  if (!rows.length) { list.innerHTML = '<div class="empty-log">No entries recorded yet today.</div>'; return; }
  list.innerHTML = rows.map(function (r) {
    return '<div class="log-row"><div class="who"><div class="nm">' + esc(r.name) + '</div><div class="id">' + esc(r.id) + ' · ' + esc(r.position) + '</div></div><div class="when"><span class="tm">' + esc(r.time) + '</span><span class="tag ' + (r.status === 'Time In' ? 'in' : 'out') + '">' + (r.status === 'Time In' ? 'IN' : 'OUT') + '</span></div></div>';
  }).join('');
}

function esc(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function extractEmployeeId(raw) {
  var text = String(raw || '').trim();
  if (!text) return '';

  var idMatch = text.match(/\b(\d{6}-\d{2,3})\b/);
  if (idMatch) return idMatch[1];

  if (/^[A-Za-z0-9][A-Za-z0-9._-]{2,}$/.test(text)) return text;

  var dataMatch = text.match(/[?&]data=([^&\s#]+)/i);
  if (dataMatch) {
    try { return decodeURIComponent(dataMatch[1].replace(/\+/g, ' ')).trim(); }
    catch (e) { return dataMatch[1].trim(); }
  }

  if (text.charAt(0) === '{' && text.charAt(text.length - 1) === '}') {
    try {
      var parsed = JSON.parse(text);
      var c = (parsed.id || parsed.employeeId || parsed.employee_id || '').toString().trim();
      if (c) return c;
    } catch (e) {}
  }

  try {
    var u = new URL(text);
    var fromUrl = (u.searchParams.get('data') || u.searchParams.get('id') || u.searchParams.get('employeeId') || '').trim();
    if (fromUrl) return fromUrl;
  } catch (e) {}

  return '';
}

initApiUrl();
testConnection();
</script>
</body>
</html>
